<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Quantity Nexus</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">
    <div id="toast-container" class="toast-container"></div>

    <main class="container">
        <div class="auth-wrapper glass-card">
            <div class="auth-header">
                <div class="logo">
                    <i data-lucide="scale" class="icon-pulse"></i>
                    <h1>Quantity<span>Nexus</span></h1>
                </div>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <div class="input-with-icon">
                        <i data-lucide="mail"></i>
                        <input type="email" id="login-email" class="form-control" placeholder="your@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="input-with-icon">
                        <i data-lucide="lock"></i>
                        <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="form-utils">
                    <label class="remember-me">
                        <input type="checkbox"> <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary full-width">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Sign up for free</a></p>
                <div class="divider"><span>OR</span></div>
                <div class="social-btns">
                    <button class="btn btn-outline"><i data-lucide="mail"></i> Google</button>
                    <button class="btn btn-outline"><i data-lucide="facebook"></i> Facebook</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { AuthService } from './js/auth.js';
        const auth = new AuthService();
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            if (await auth.login(email, password)) {
                window.location.href = 'index.html';
            }
        });
        
        lucide.createIcons();
    </script>
</body>
</html>
